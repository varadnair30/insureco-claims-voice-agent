version: "3.8"

services:
  agent-backend:
    build: .
    container_name: observe-claims-agent
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - PORT=8000
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
